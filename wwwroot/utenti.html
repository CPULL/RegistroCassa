<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utenti — Registro di Cassa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/RegistroDiCassa/css/site.css" />
  <link rel="icon" type="image/png" href="/RegistroDiCassa/favicon.png" />
</head>
<body>

<div id="navbarContainer"></div>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0"><i class="bi bi-people me-2"></i>Gestione Utenti</h5>
        <button class="btn btn-success btn-sm" id="btnNewUser">
            <i class="bi bi-person-plus me-1"></i>Nuovo Utente
        </button>
    </div>

    <div id="alertBox"></div>

    <div class="card">
        <div class="card-body p-0">
            <div id="pageLoader" class="text-center py-4">
                <span class="spinner-border spinner-border-sm me-2"></span>Caricamento...
            </div>
            <div class="table-responsive" id="tableContainer" style="display:none">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nome</th>
                            <th>Ruolo</th>
                            <th>Sede</th>
                            <th>Stato</th>
                            <th class="text-end">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Nuovo Utente -->
<div class="modal fade" id="modalNewUser" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuovo Utente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="newUserAlert"></div>
                <div class="mb-3">
                    <label class="form-label">Nome completo</label>
                    <input type="text" id="newFullName" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="newPassword" class="form-control" />
                    <div class="form-text">Minimo 6 caratteri, almeno una cifra.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ruolo</label>
                    <select id="newRole" class="form-select">
                        <option value="">— Seleziona —</option>
                        <option value="Operatore">Operatore</option>
                        <option value="Amministratore">Amministratore</option>
                    </select>
                </div>
                <div class="mb-3" id="newSedeRow" style="display:none">
                    <label class="form-label">Sede <span class="text-danger">*</span></label>
                    <select id="newSede" class="form-select">
                        <option value="">— Seleziona —</option>
                        <option value="PontiRossi">PontiRossi</option>
                        <option value="Poggio">Poggio</option>
                        <option value="Porcellane">Porcellane</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="button" class="btn btn-success" id="btnSaveNewUser">
                    <i class="bi bi-save me-1"></i>Crea Utente
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Cambia Password -->
<div class="modal fade" id="modalChangePwd" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cambia Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="changePwdAlert"></div>
                <p class="text-muted mb-3">Utente: <strong id="changePwdName"></strong></p>
                <input type="hidden" id="changePwdUserId" />
                <div class="mb-3">
                    <label class="form-label">Nuova Password</label>
                    <input type="password" id="newPwd" class="form-control" />
                    <div class="form-text">Minimo 6 caratteri, almeno una cifra.</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="button" class="btn btn-primary" id="btnSaveChangePwd">
                    <i class="bi bi-save me-1"></i>Salva Password
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/RegistroDiCassa/js/api.js"></script>
<script src="/RegistroDiCassa/js/navbar.js"></script>
<script>
    let modalNewUser, modalChangePwd;

    renderNavbar();
    requireAuth(user => {
        if (user.role !== 'Amministratore') { window.location.href = BASE + '/index.html'; return; }
        loadUsers();
    });

    modalNewUser = new bootstrap.Modal('#modalNewUser');
    modalChangePwd = new bootstrap.Modal('#modalChangePwd');

    function loadUsers() {
        $('#pageLoader').show();
        $('#tableContainer').hide();
        Api.get('/api/admin/users')
            .done(renderUsers)
            .fail(() => showAlert('alertBox', 'Errore nel caricamento degli utenti.'))
            .always(() => $('#pageLoader').hide());
    }

    function renderUsers(users) {
        const rows = users.map(u => {
            const roleBadge = u.role === 'Amministratore'
                ? '<span class="badge bg-primary">Amministratore</span>'
                : '<span class="badge bg-secondary">Operatore</span>';
            const statusBadge = u.isActive
                ? '<span class="badge bg-success">Attivo</span>'
                : '<span class="badge bg-secondary">Disabilitato</span>';
            const toggleIcon = u.isActive ? 'bi-person-dash' : 'bi-person-check';
            const toggleClass = u.isActive ? 'btn-outline-warning' : 'btn-outline-success';
            const toggleTitle = u.isActive ? 'Disabilita' : 'Abilita';
            return `<tr>
                <td>${$('<span>').text(u.fullName).html()}</td>
                <td>${roleBadge}</td>
                <td>${u.sede || '—'}</td>
                <td>${statusBadge}</td>
                <td class="text-end">
                    <button class="btn btn-outline-primary btn-sm btn-changepwd"
                        data-id="${u.id}" data-name="${$('<span>').text(u.fullName).html()}"
                        title="Cambia password"><i class="bi bi-key"></i></button>
                    <button class="btn ${toggleClass} btn-sm btn-toggle"
                        data-id="${u.id}" title="${toggleTitle}">
                        <i class="bi ${toggleIcon}"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
        $('#usersBody').html(rows);
        $('#tableContainer').show();
    }

    $('#newRole').on('change', function() {
        $('#newSedeRow').toggle($(this).val() === 'Operatore');
        if ($(this).val() !== 'Operatore') $('#newSede').val('');
    });

    $('#btnNewUser').on('click', () => {
        $('#newFullName, #newPassword').val('');
        $('#newRole').val('');
        $('#newSede').val('');
        $('#newSedeRow').hide();
        $('#newUserAlert').html('');
        modalNewUser.show();
    });

    $('#btnSaveNewUser').on('click', () => {
        const payload = {
            fullName: $('#newFullName').val().trim(),
            password: $('#newPassword').val(),
            role: $('#newRole').val(),
            sede: $('#newSede').val() || null
        };
        if (!payload.fullName || !payload.password || !payload.role) {
            showAlert('newUserAlert', 'Compilare tutti i campi.');
            return;
        }
        Api.post('/api/admin/users', payload)
            .done(() => { modalNewUser.hide(); loadUsers(); showAlert('alertBox', 'Utente creato con successo.', 'success'); })
            .fail(xhr => {
                const errors = xhr.responseJSON?.errors?.join('<br>') || 'Errore nella creazione.';
                showAlert('newUserAlert', errors);
            });
    });

    $(document).on('click', '.btn-changepwd', function () {
        $('#changePwdUserId').val($(this).data('id'));
        $('#changePwdName').text($(this).data('name'));
        $('#newPwd').val('');
        $('#changePwdAlert').html('');
        modalChangePwd.show();
    });

    $('#btnSaveChangePwd').on('click', () => {
        const payload = {
            userId: $('#changePwdUserId').val(),
            newPassword: $('#newPwd').val()
        };
        if (!payload.newPassword) {
            showAlert('changePwdAlert', 'Inserire la nuova password.');
            return;
        }
        Api.post('/api/admin/users/change-password', payload)
            .done(() => { modalChangePwd.hide(); showAlert('alertBox', 'Password aggiornata.', 'success'); })
            .fail(xhr => {
                const errors = xhr.responseJSON?.errors?.join('<br>') || 'Errore nel cambio password.';
                showAlert('changePwdAlert', errors);
            });
    });

    $(document).on('click', '.btn-toggle', function () {
        const id = $(this).data('id');
        Api.post('/api/admin/users/' + id + '/toggle-active')
            .done(() => loadUsers())
            .fail(xhr => showAlert('alertBox', xhr.responseJSON?.message || 'Errore.'));
    });
</script>
</body>
</html>
