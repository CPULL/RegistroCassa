<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giorni di Chiusura</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/site.css" />
  <style>
    .input-row td {
      padding: 3px 5px;
      vertical-align: middle;
      background-color: var(--bg-insert);
    }
  </style>
</head>
<body>

  <div id="navbarContainer"></div>

  <div class="container-fluid">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0"><i class="bi bi-calendar-x me-2"></i>Giorni di Chiusura</h5>
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0">Anno:</label>
        <input type="number" id="filterYear" class="form-control form-control-sm" style="width:90px" min="2000" max="2100" />
        <button class="btn btn-outline-primary btn-sm" id="btnFilter">
          <i class="bi bi-search me-1"></i>Cerca
        </button>
      </div>
    </div>

    <div id="alertBox"></div>

    <div class="card">
      <div class="card-body p-0">
        <div id="pageLoader" class="text-center py-4" style="display:none">
          <span class="spinner-border spinner-border-sm me-2"></span>Caricamento...
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:120px">Data</th>
                <th style="width:100px">Giorno</th>
                <th>Note</th>
                <th style="width:130px" class="text-end">Azioni</th>
              </tr>
            </thead>
            <tbody id="closureBody"></tbody>
            <tfoot>
              <tr class="input-row">
                <td>
                  <input type="date" id="newDate" class="form-control form-control-sm" />
                </td>
                <td id="newDayName" class="text-muted" style="font-size:0.82rem"></td>
                <td>
                  <input type="text" id="newNotes" class="form-control form-control-sm"
                         maxlength="200" placeholder="Note opzionali..." />
                </td>
                <td class="text-end">
                  <button class="btn btn-success btn-sm" id="btnAdd">
                    <i class="bi bi-check-lg"></i>
                  </button>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Modifica -->
  <div class="modal fade" id="modalEdit" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modifica Giorno di Chiusura</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="editAlert"></div>
          <input type="hidden" id="editId" />
          <div class="mb-3">
            <label class="form-label">Data</label>
            <input type="date" id="editDate" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Note</label>
            <input type="text" id="editNotes" class="form-control" maxlength="200" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-primary" id="btnSaveEdit">
            <i class="bi bi-save me-1"></i>Salva
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    const DAY_NAMES = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
    const modalEdit = new bootstrap.Modal('#modalEdit');
    let filterYear = new Date().getFullYear();

    renderNavbar();
    requireAuth(user => {
      if (!user.sede) {
        showAlert('alertBox', 'Selezionare una sede dal menu in alto.', 'warning');
        return;
      }
      syncSedePicker(user.sede);
      $('#filterYear').val(filterYear);
      $('#newDate').val(new Date().toISOString().slice(0, 10));
      updateNewDayName();
      loadClosures();
    });

    function onSedeChanged() { loadClosures(); }

    function dayName(dateStr) {
      return DAY_NAMES[new Date(dateStr + 'T00:00:00').getDay()];
    }

    function updateNewDayName() {
      const d = $('#newDate').val();
      $('#newDayName').text(d ? dayName(d) : '');
    }

    $('#newDate').on('change', updateNewDayName);

    function loadClosures() {
      $('#pageLoader').show();
      $('#closureBody').html('');
      Api.get(`/api/chiusure?year=${filterYear}`)
        .done(data => {
          if (data.length === 0) {
            $('#closureBody').html('<tr><td colspan="4" class="text-muted text-center py-3" style="font-style:italic">Nessun giorno di chiusura per questo anno.</td></tr>');
          } else {
            const rows = data.map(c => {
              const dateStr = c.date.slice(0, 10);
              const dateLabel = new Date(dateStr + 'T00:00:00').toLocaleDateString('it-IT');
              return `<tr>
                <td>${dateLabel}</td>
                <td class="text-muted" style="font-size:0.82rem">${dayName(dateStr)}</td>
                <td>${c.notes || '—'}</td>
                <td class="text-end">
                  <button class="btn btn-outline-primary btn-sm btn-edit"
                    data-id="${c.id}" data-date="${dateStr}" data-notes="${c.notes || ''}">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-outline-danger btn-sm btn-delete" data-id="${c.id}">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              </tr>`;
            }).join('');
            $('#closureBody').html(rows);
          }
        })
        .fail(() => showAlert('alertBox', 'Errore nel caricamento.'))
        .always(() => $('#pageLoader').hide());
    }

    $('#btnFilter').on('click', () => {
      filterYear = parseInt($('#filterYear').val());
      loadClosures();
    });

    $('#filterYear').on('keydown', e => { if (e.key === 'Enter') $('#btnFilter').click(); });

    $('#btnAdd').on('click', () => {
      const date = $('#newDate').val();
      const notes = $('#newNotes').val().trim();
      if (!date) { showAlert('alertBox', 'Selezionare una data.'); return; }

      $('#btnAdd').prop('disabled', true);
      Api.post('/api/chiusure', { date: date + 'T00:00:00', notes: notes || null })
        .done(() => {
          $('#newNotes').val('');
          filterYear = new Date(date + 'T00:00:00').getFullYear();
          $('#filterYear').val(filterYear);
          loadClosures();
        })
        .fail(xhr => showAlert('alertBox', xhr.responseJSON?.message || 'Errore nell\'aggiunta.'))
        .always(() => $('#btnAdd').prop('disabled', false));
    });

    $('#newDate, #newNotes').on('keydown', e => { if (e.key === 'Enter') $('#btnAdd').click(); });

    // Edit
    $(document).on('click', '.btn-edit', function () {
      $('#editId').val($(this).data('id'));
      $('#editDate').val($(this).data('date'));
      $('#editNotes').val($(this).data('notes'));
      $('#editAlert').html('');
      modalEdit.show();
    });

    $('#btnSaveEdit').on('click', () => {
      const id = $('#editId').val();
      const date = $('#editDate').val();
      if (!date) { showAlert('editAlert', 'Selezionare una data.'); return; }

      Api.put('/api/chiusure/' + id, { date: date + 'T00:00:00', notes: $('#editNotes').val().trim() || null })
        .done(() => { modalEdit.hide(); loadClosures(); })
        .fail(xhr => showAlert('editAlert', xhr.responseJSON?.message || 'Errore nel salvataggio.'));
    });

    // Delete
    $(document).on('click', '.btn-delete', function () {
      const id = $(this).data('id');
      if (!confirm('Eliminare questo giorno di chiusura?')) return;
      Api.del('/api/chiusure/' + id)
        .done(() => loadClosures())
        .fail(() => showAlert('alertBox', 'Errore nella rimozione.'));
    });
  </script>
</body>
</html>
