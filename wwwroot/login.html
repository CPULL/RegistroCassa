<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accesso — Registro di Cassa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="icon" type="image/png" href="/RegistroDiCassa/favicon.png" />
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h5 class="mb-0"><i class="bi bi-cash-stack me-2"></i>Registro di Cassa</h5>
                </div>
                <div class="card-body p-4">
                    <h6 class="mb-3">Accesso</h6>
                    <div id="alertBox"></div>

                    <div class="mb-3">
                        <label class="form-label">Utente</label>
                        <input type="text" id="user" class="form-control" autocomplete="username" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" autocomplete="current-password" />
                    </div>

                    <button id="btnLogin" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Accedi
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/api.js"></script>
<script>
  function doLogin() {
    const user = $('#user').val().trim();
    const password = $('#password').val();
    if (!user || !password) {
      showAlert('alertBox', 'Inserire utente e password.');
      return;
    }
    $('#btnLogin').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>Accesso...');
    Api.post('/api/account/login', { user, password })
      .done(() => { window.location.href = '/index.html'; })
			.fail(xhr => {
				const msg = xhr.responseJSON?.message || 'Errore di accesso.';
				$('#alertBox').html('<div class="alert alert-danger">' + msg + '</div>');
				$('#btnLogin').prop('disabled', false).html('<i class="bi bi-box-arrow-in-right me-1"></i>Accedi');
			});
  }

  $('#btnLogin').on('click', doLogin);
	$('#user, #password').on('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
