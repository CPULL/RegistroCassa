<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambia Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body>

<div id="navbarContainer"></div>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header fw-semibold">
          <i class="bi bi-key me-2"></i>Cambia Password
        </div>
        <div class="card-body">
          <div id="alertBox"></div>
          <div class="mb-3">
            <label class="form-label">Password attuale</label>
            <input type="password" id="currentPassword" class="form-control" autocomplete="off" />
          </div>
          <div class="mb-3">
            <label class="form-label">Nuova password</label>
            <input type="password" id="newPassword" class="form-control" autocomplete="off" />
            <div class="form-text">Minimo 6 caratteri, almeno una cifra.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Conferma nuova password</label>
            <input type="password" id="confirmPassword" class="form-control" autocomplete="off" />
          </div>
          <button class="btn btn-primary w-100" id="btnSave">
            <i class="bi bi-save me-1"></i>Salva
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
  renderNavbar();
  requireAuth();

  $('#btnSave').on('click', () => {
    const currentPassword = $('#currentPassword').val();
    const newPassword = $('#newPassword').val();
    const confirmPassword = $('#confirmPassword').val();

    if (!currentPassword || !newPassword || !confirmPassword) {
      showAlert('alertBox', 'Compilare tutti i campi.');
      return;
    }
    if (newPassword !== confirmPassword) {
      showAlert('alertBox', 'La nuova password e la conferma non coincidono.');
      return;
    }
    if (newPassword.length < 6) {
      showAlert('alertBox', 'La nuova password deve essere di almeno 6 caratteri.');
      return;
    }

    $('#btnSave').prop('disabled', true);
    Api.post('/api/account/change-password', { currentPassword, newPassword })
      .done(() => {
        showAlert('alertBox', 'Password aggiornata con successo.', 'success');
        $('#currentPassword, #newPassword, #confirmPassword').val('');
      })
      .fail(xhr => {
        const resp = xhr.responseJSON;
        const msg = resp?.errors
          ? Object.values(resp.errors).flat().join('<br>')
          : (resp?.message || 'Errore nel cambio password.');
        showAlert('alertBox', msg);
      })
      .always(() => $('#btnSave').prop('disabled', false));
  });

  $('#currentPassword, #newPassword, #confirmPassword').on('keydown', e => {
    if (e.key === 'Enter') $('#btnSave').click();
  });
</script>
</body>
</html>
